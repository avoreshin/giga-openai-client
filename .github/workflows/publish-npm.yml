# Публикация в npm: при создании Release на GitHub или вручную (Actions → Run workflow).
# Репозиторий → Settings → Secrets and variables → Actions → New repository secret:
#   NPM_TOKEN — Automation token с npmjs.com (или Granular Access Token с правом publish).

name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # Scoped-пакеты (@scope/name) тоже нуждаются в --access public при первой публикации
        run: npm publish --access public
